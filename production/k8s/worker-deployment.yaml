apiVersion: apps/v1
kind: Deployment
metadata:
  name: fte-message-processor
  namespace: customer-success-fte
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fte-worker
  template:
    metadata:
      labels:
        app: fte-worker
    spec:
      containers:
      - name: worker
        image: fte-api:latest
        command: ["python", "-m", "workers.message_processor"]
        envFrom:
        - configMapRef:
            name: fte-config
        - secretRef:
            name: fte-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
